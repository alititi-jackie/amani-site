<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Amani.love - 音乐空间">
<meta name="theme-color" content="#000000">

<title>Amani.love</title>

<style>

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: white;
}

body {
  display: flex;
  flex-direction: column;
}

/* 星空背景 */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='1' fill='white' opacity='0.8'/%3E%3Ccircle cx='30' cy='20' r='0.5' fill='white' opacity='0.6'/%3E%3Ccircle cx='50' cy='30' r='0.8' fill='white' opacity='0.7'/%3E%3Ccircle cx='70' cy='15' r='1' fill='white' opacity='0.9'/%3E%3Ccircle cx='90' cy='40' r='0.6' fill='white' opacity='0.5'/%3E%3Ccircle cx='20' cy='60' r='0.9' fill='white' opacity='0.8'/%3E%3Ccircle cx='40' cy='70' r='1' fill='white' opacity='0.7'/%3E%3Ccircle cx='60' cy='50' r='0.7' fill='white' opacity='0.6'/%3E%3Ccircle cx='80' cy='80' r='0.8' fill='white' opacity='0.8'/%3E%3C/svg%3E");
  background-size: 150px 150px;
  animation: starsMove 120s linear infinite;
  opacity: 0.4;
  z-index: 1;
  pointer-events: none;
}

@keyframes starsMove {
  from { background-position: 0 0; }
  to { background-position: 1000px 1000px; }
}

/* 能量光圈 */
.ring {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  border: 2px solid rgba(0, 180, 255, 0.9);
  box-shadow: 
    0 0 20px rgba(0, 180, 255, 0.9),
    0 0 60px rgba(0, 180, 255, 0.6),
    0 0 140px rgba(0, 180, 255, 0.4);
  animation: spin 8s linear infinite;
  z-index: 2;
}

@keyframes spin {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 标题 */
.title {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: 700;
  letter-spacing: 8px;
  background: linear-gradient(90deg, #fff, #9be7ff, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
  opacity: 0;
  animation: fadein 4s forwards;
  z-index: 3;
  white-space: nowrap;
}

@keyframes fadein {
  0% {
    opacity: 0;
    transform: translate(-50%, -40%);
  }
  100% {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

/* 视频容器 */
.video-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 5;
}

#video {
  width: 100%;
  height: 100%;
  border: none;
}

/* 顶部导航栏 */
.nav-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: auto;
  min-height: 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  z-index: 100;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.3));
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  gap: 10px;
  flex-wrap: nowrap;
  white-space: nowrap;
}

.nav-bar.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Logo */
.logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #fff, #9be7ff, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  transition: all 0.3s ease;
  user-select: none;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: auto;
}

.logo:active {
  transform: scale(0.95);
}

/* 返回按钮 */
.back-btn {
  padding: 8px 12px;
  background: rgba(0, 180, 255, 0.15);
  border: 1px solid rgba(0, 180, 255, 0.8);
  color: #9be7ff;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-block;
  white-space: nowrap;
  flex-shrink: 0;
}

.back-btn:active {
  background: rgba(0, 180, 255, 0.3);
  box-shadow: 0 0 15px rgba(0, 180, 255, 0.6);
}

/* 底部版权信息 */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: auto;
  min-height: 45px;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 10px;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.85));
  font-size: 11px;
  color: rgba(255, 255, 255, 0.7);
  z-index: 100;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  text-align: center;
  line-height: 1.4;
  word-break: break-word;
}

.footer.hidden {
  opacity: 0;
  pointer-events: none;
}

.footer a {
  color: rgba(0, 180, 255, 0.8);
  text-decoration: none;
  transition: color 0.3s ease;
}

.footer a:active {
  color: #9be7ff;
  text-decoration: underline;
}

/* 平板设备 */
@media (min-width: 768px) {
  .nav-bar {
    min-height: 60px;
    padding: 12px 30px;
  }

  .logo {
    font-size: 22px;
    letter-spacing: 3px;
  }

  .back-btn {
    padding: 10px 20px;
    font-size: 13px;
  }

  .footer {
    min-height: 55px;
    font-size: 12px;
    padding: 12px 20px;
  }
}

/* 大屏设备 */
@media (min-width: 1024px) {
  .logo {
    font-size: 24px;
    letter-spacing: 4px;
  }

  .back-btn {
    padding: 10px 24px;
    font-size: 14px;
  }

  .footer {
    font-size: 13px;
  }
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="ring"></div>
<div class="title">Amani.love</div>

<!-- 顶部导航栏 -->
<div class="nav-bar">
  <div class="logo" onclick="location.reload()" title="点击刷新页面">Amani.love</div>
  <a href="https://openaa.com" class="back-btn" target="_blank" rel="noopener noreferrer">返回 OpenAA</a>
</div>

<!-- 视频容器 -->
<div class="video-container">
  <iframe
    id="video"
    src="https://www.youtube.com/embed/9UZhX3K0o0Q?autoplay=1&controls=1&rel=0&fs=1&modestbranding=1&loop=1&playlist=9UZhX3K0o0Q"
    allow="autoplay; encrypted-media; fullscreen"
    allowfullscreen
    loading="lazy">
  </iframe>
</div>

<!-- 底部版权信息 -->
<div class="footer">
    <div>   
  © 2025 <a href="https://openaa.com/about/" target="_blank" rel="noopener noreferrer">OpenAA.com</a> 保留所有权利 | 联系邮箱：<a href="mailto:323748@gmail.com">323748@gmail.com</a>
</div>

<script>

// 定时器变量
let hideTimer;
let hideControlsTimer;

// 页面加载完成后的处理
document.addEventListener('DOMContentLoaded', function() {
  // 6秒后显示视频并隐藏动画
  hideTimer = setTimeout(function() {
    document.querySelector('.ring').style.display = 'none';
    document.querySelector('.title').style.display = 'none';
    document.querySelector('.video-container').style.display = 'block';
    
    // 显示导航栏和底部（保持可见）
    document.querySelector('.nav-bar').classList.remove('hidden');
    document.querySelector('.footer').classList.remove('hidden');
  }, 6000);
});

// 防止导航栏被隐藏
document.addEventListener('fullscreenchange', function() {
  const navBar = document.querySelector('.nav-bar');
  const footer = document.querySelector('.footer');
  
  if (!document.fullscreenElement) {
    navBar.classList.remove('hidden');
    footer.classList.remove('hidden');
  }
});

// 响应式处理 - 确保移动设备上导航栏可见
window.addEventListener('resize', function() {
  const navBar = document.querySelector('.nav-bar');
  const footer = document.querySelector('.footer');
  
  if (document.querySelector('.video-container').style.display === 'block') {
    navBar.classList.remove('hidden');
    footer.classList.remove('hidden');
  }
});

// 禁用自动隐藏导航栏（保持始终可见）
document.addEventListener('mousemove', function(e) {
  // 移动设备不触发此事件
  if (e.clientX !== 0 || e.clientY !== 0) {
    clearTimeout(hideControlsTimer);
  }
});

</script>

</body>
</html>
